name: insight_student_app
description: Mobile application for InSight student attendance system.
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  provider: ^6.1.1
  mobile_scanner: ^5.1.0
  fl_chart: ^0.66.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  geolocator: ^10.1.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/LOGO.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
